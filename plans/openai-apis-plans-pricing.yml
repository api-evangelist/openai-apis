specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: OpenAI APIs
providerId: openai-apis
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Artificial Intelligence
  - Language Models
  - Embeddings
  - Image Generation
  - Speech
description: OpenAI prices the API per-model with usage-based, per-token rates (separate input and output
  prices), plus per-image, per-second, and per-request line items for non-text modalities. Account access
  is gated by usage tiers (Free, Tier 1 through Tier 5) which raise rate limits as cumulative spend grows;
  the tiers do not change unit prices. Batch API offers a 50% discount on most models. Enterprise customers
  can negotiate dedicated capacity (Provisioned Throughput) and custom contract pricing.
sources:
  - https://openai.com/api/pricing/
  - https://platform.openai.com/docs/pricing
  - https://platform.openai.com/docs/guides/rate-limits
