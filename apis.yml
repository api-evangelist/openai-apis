aid: openai-apis
name: OpenAI APIs
description: >-
  Collection of OpenAI's artificial intelligence APIs for natural language
  processing, image generation, speech, and embeddings including Chat
  Completions, Completions, Images, Audio, Embeddings, Moderations, and
  Assistants APIs.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Artificial Intelligence
  - Embeddings
  - Image Generation
  - Language Models
  - Speech
url: https://raw.githubusercontent.com/api-evangelist/openai-apis/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-04-28'
specificationVersion: '0.19'
