naftiko: 1.0.0-alpha2
info:
  label: OpenAI APIs OpenAI Audio API — Transcription
  description: 'OpenAI APIs OpenAI Audio API — Transcription. 1 operations. Lead operation: OpenAI APIs Create transcription.
    Self-contained Naftiko capability covering one Openai Apis business surface.'
  tags:
  - Openai Apis
  - Transcription
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENAI_APIS_API_KEY: OPENAI_APIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: openai-audio-transcription
    baseUri: https://api.openai.com/v1
    description: OpenAI APIs OpenAI Audio API — Transcription business capability. Self-contained, no shared references.
    resources:
    - name: audio-transcriptions
      path: /audio/transcriptions
      operations:
      - name: createtranscription
        method: POST
        description: OpenAI APIs Create transcription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.OPENAI_APIS_API_KEY}}'
  exposes:
  - type: rest
    namespace: openai-audio-transcription-rest
    port: 8080
    description: REST adapter for OpenAI APIs OpenAI Audio API — Transcription. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/audio/transcriptions
      name: audio-transcriptions
      description: REST surface for audio-transcriptions.
      operations:
      - method: POST
        name: createtranscription
        description: OpenAI APIs Create transcription
        call: openai-audio-transcription.createtranscription
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openai-audio-transcription-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenAI APIs OpenAI Audio API — Transcription. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: openai-apis-create-transcription
      description: OpenAI APIs Create transcription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openai-audio-transcription.createtranscription
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
