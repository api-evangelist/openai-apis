    resources:
    - name: completions
      path: /completions
      operations:
      - name: createcompletion
        method: POST
        description: OpenAI APIs Create completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
