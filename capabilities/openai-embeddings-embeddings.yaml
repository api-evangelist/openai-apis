naftiko: 1.0.0-alpha2
info:
  label: OpenAI APIs OpenAI Embeddings API — Embeddings
  description: 'OpenAI APIs OpenAI Embeddings API — Embeddings. 1 operations. Lead operation: OpenAI APIs Create embeddings.
    Self-contained Naftiko capability covering one Openai Apis business surface.'
  tags:
  - Openai Apis
  - Embeddings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENAI_APIS_API_KEY: OPENAI_APIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: openai-embeddings-embeddings
    baseUri: https://api.openai.com/v1
    description: OpenAI APIs OpenAI Embeddings API — Embeddings business capability. Self-contained, no shared references.
    resources:
    - name: embeddings
      path: /embeddings
      operations:
      - name: createembedding
        method: POST
        description: OpenAI APIs Create embeddings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.OPENAI_APIS_API_KEY}}'
  exposes:
  - type: rest
    namespace: openai-embeddings-embeddings-rest
    port: 8080
    description: REST adapter for OpenAI APIs OpenAI Embeddings API — Embeddings. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/embeddings
      name: embeddings
      description: REST surface for embeddings.
      operations:
      - method: POST
        name: createembedding
        description: OpenAI APIs Create embeddings
        call: openai-embeddings-embeddings.createembedding
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openai-embeddings-embeddings-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenAI APIs OpenAI Embeddings API — Embeddings. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: openai-apis-create-embeddings
      description: OpenAI APIs Create embeddings
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openai-embeddings-embeddings.createembedding
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
