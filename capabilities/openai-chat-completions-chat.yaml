naftiko: 1.0.0-alpha2
info:
  label: OpenAI APIs OpenAI Chat Completions API — Chat
  description: 'OpenAI APIs OpenAI Chat Completions API — Chat. 1 operations. Lead operation: OpenAI APIs Create chat completion.
    Self-contained Naftiko capability covering one Openai Apis business surface.'
  tags:
  - Openai Apis
  - Chat
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENAI_APIS_API_KEY: OPENAI_APIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: openai-chat-completions-chat
    baseUri: https://api.openai.com/v1
    description: OpenAI APIs OpenAI Chat Completions API — Chat business capability. Self-contained, no shared references.
    resources:
    - name: chat-completions
      path: /chat/completions
      operations:
      - name: createchatcompletion
        method: POST
        description: OpenAI APIs Create chat completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.OPENAI_APIS_API_KEY}}'
  exposes:
  - type: rest
    namespace: openai-chat-completions-chat-rest
    port: 8080
    description: REST adapter for OpenAI APIs OpenAI Chat Completions API — Chat. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/chat/completions
      name: chat-completions
      description: REST surface for chat-completions.
      operations:
      - method: POST
        name: createchatcompletion
        description: OpenAI APIs Create chat completion
        call: openai-chat-completions-chat.createchatcompletion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openai-chat-completions-chat-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenAI APIs OpenAI Chat Completions API — Chat. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: openai-apis-create-chat-completion
      description: OpenAI APIs Create chat completion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openai-chat-completions-chat.createchatcompletion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
