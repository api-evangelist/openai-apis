naftiko: 1.0.0-alpha2
info:
  label: OpenAI APIs OpenAI Assistants API — Messages
  description: 'OpenAI APIs OpenAI Assistants API — Messages. 3 operations. Lead operation: OpenAI APIs List messages. Self-contained
    Naftiko capability covering one Openai Apis business surface.'
  tags:
  - Openai Apis
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENAI_APIS_API_KEY: OPENAI_APIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: openai-assistants-messages
    baseUri: https://api.openai.com/v1
    description: OpenAI APIs OpenAI Assistants API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: threads-thread_id-messages
      path: /threads/{thread_id}/messages
      operations:
      - name: listmessages
        method: GET
        description: OpenAI APIs List messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createmessage
        method: POST
        description: OpenAI APIs Create message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: threads-thread_id-messages-message_id
      path: /threads/{thread_id}/messages/{message_id}
      operations:
      - name: getmessage
        method: GET
        description: OpenAI APIs Retrieve message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.OPENAI_APIS_API_KEY}}'
  exposes:
  - type: rest
    namespace: openai-assistants-messages-rest
    port: 8080
    description: REST adapter for OpenAI APIs OpenAI Assistants API — Messages. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/threads/{thread-id}/messages
      name: threads-thread-id-messages
      description: REST surface for threads-thread_id-messages.
      operations:
      - method: GET
        name: listmessages
        description: OpenAI APIs List messages
        call: openai-assistants-messages.listmessages
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createmessage
        description: OpenAI APIs Create message
        call: openai-assistants-messages.createmessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/threads/{thread-id}/messages/{message-id}
      name: threads-thread-id-messages-message-id
      description: REST surface for threads-thread_id-messages-message_id.
      operations:
      - method: GET
        name: getmessage
        description: OpenAI APIs Retrieve message
        call: openai-assistants-messages.getmessage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openai-assistants-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenAI APIs OpenAI Assistants API — Messages. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: openai-apis-list-messages
      description: OpenAI APIs List messages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openai-assistants-messages.listmessages
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-apis-create-message
      description: OpenAI APIs Create message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openai-assistants-messages.createmessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: openai-apis-retrieve-message
      description: OpenAI APIs Retrieve message
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openai-assistants-messages.getmessage
      outputParameters:
      - type: object
        mapping: $.
