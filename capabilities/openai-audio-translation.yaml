naftiko: 1.0.0-alpha2
info:
  label: OpenAI APIs OpenAI Audio API — Translation
  description: 'OpenAI APIs OpenAI Audio API — Translation. 1 operations. Lead operation: OpenAI APIs Create translation.
    Self-contained Naftiko capability covering one Openai Apis business surface.'
  tags:
  - Openai Apis
  - Translation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENAI_APIS_API_KEY: OPENAI_APIS_API_KEY
capability:
  consumes:
  - type: http
    namespace: openai-audio-translation
    baseUri: https://api.openai.com/v1
    description: OpenAI APIs OpenAI Audio API — Translation business capability. Self-contained, no shared references.
    resources:
    - name: audio-translations
      path: /audio/translations
      operations:
      - name: createtranslation
        method: POST
        description: OpenAI APIs Create translation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.OPENAI_APIS_API_KEY}}'
  exposes:
  - type: rest
    namespace: openai-audio-translation-rest
    port: 8080
    description: REST adapter for OpenAI APIs OpenAI Audio API — Translation. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/audio/translations
      name: audio-translations
      description: REST surface for audio-translations.
      operations:
      - method: POST
        name: createtranslation
        description: OpenAI APIs Create translation
        call: openai-audio-translation.createtranslation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openai-audio-translation-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenAI APIs OpenAI Audio API — Translation. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: openai-apis-create-translation
      description: OpenAI APIs Create translation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openai-audio-translation.createtranslation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
