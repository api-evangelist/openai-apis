specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: OpenAI APIs
providerId: openai-apis
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Artificial Intelligence
  - Language Models
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for the OpenAI API platform: token-based pay-as-you-go billing across
  text, image, audio, and video models, with batch and prompt-caching discounts plus optional Provisioned
  Throughput commitments for enterprise.'
sources:
  - https://openai.com/api/pricing/
  - https://platform.openai.com/docs/guides/rate-limits
  - https://platform.openai.com/usage
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: OpenAI, L.L.C.
serviceCategory: AI Infrastructure
billingModel:
  pricingCategory: Token-Based Usage + Committed Throughput
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Credit
    - Adjustment
focusColumns:
  ServiceName: OpenAI API
  ServiceCategory: AI Infrastructure
  ProviderName: OpenAI
  PublisherName: OpenAI, L.L.C.
  InvoiceIssuerName: OpenAI, L.L.C.
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingUnit: token
meters:
  - name: tokens_input
    unit: token
    aggregation: sum
    dimensions:
      - model
      - organization
      - project
      - api_key
      - cached
  - name: tokens_output
    unit: token
    aggregation: sum
    dimensions:
      - model
      - organization
      - project
      - api_key
      - reasoning
  - name: cached_tokens
    unit: token
    aggregation: sum
    dimensions:
      - model
      - organization
  - name: image_generations
    unit: image
    aggregation: sum
    dimensions:
      - model
      - resolution
      - quality
  - name: video_seconds
    unit: second
    aggregation: sum
    dimensions:
      - model
      - resolution
  - name: audio_seconds
    unit: second
    aggregation: sum
    dimensions:
      - model
      - direction
  - name: tool_calls
    unit: call
    aggregation: sum
    dimensions:
      - tool
  - name: file_storage
    unit: GB-day
    aggregation: sum
    dimensions:
      - vector_store
  - name: provisioned_throughput_hours
    unit: PTU-hour
    aggregation: sum
    dimensions:
      - model
principles:
  - name: Visibility
    description: Use the Usage dashboard, the /v1/usage endpoint, and project-scoped API keys to attribute
      tokens and cost per team/feature in near-real-time.
  - name: Allocation
    description: Create separate Projects and API keys per workload; tag requests with metadata such as
      user/feature in your application logs to back-allocate spend.
  - name: Optimization
    description: Route to the cheapest sufficient model (nano/mini before flagship), enable prompt caching,
      use the Batch API for non-urgent jobs (50% off), trim system prompts, and prefer structured outputs
      over chain-of-thought when latency permits.
  - name: Accountability
    description: Set hard usage limits and per-project budget alerts in the OpenAI console; assign a model-cost
      owner who reviews the monthly invoice against forecast and investigates token-cost regressions.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
